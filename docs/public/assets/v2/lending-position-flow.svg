<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #fff; stroke: #1f2937; stroke-width: 2; rx: 18; }
      .mint { fill: #e7f6f2; }
      .blue { fill: #edf3ff; }
      .sand { fill: #fff3dc; }
      .title { font: 700 30px "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 600 20px "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 500 17px "Segoe UI", sans-serif; fill: #1f2937; }
      .line { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620" rx="28"/>
  <text class="title" x="60" y="60">Single-Sided Lending Flow in v2.2</text>

  <rect class="panel sand" x="60" y="170" width="220" height="120"/>
  <text class="subtitle" x="105" y="215">User</text>
  <text class="body" x="105" y="250">deposit one asset</text>

  <rect class="panel blue" x="350" y="120" width="280" height="170"/>
  <text class="subtitle" x="385" y="165">LikwidLendPosition</text>
  <text class="body" x="385" y="205">creates lending-position NFT</text>
  <text class="body" x="385" y="235">tracks owner and pool side</text>
  <text class="body" x="385" y="265">routes lend or swap actions</text>

  <rect class="panel mint" x="720" y="120" width="390" height="220"/>
  <text class="subtitle" x="755" y="165">LikwidVault</text>
  <text class="body" x="755" y="205">updates lend reserves</text>
  <text class="body" x="755" y="235">updates mirror + interest reserves</text>
  <text class="body" x="755" y="265">updates deposit cumulative state</text>
  <text class="body" x="755" y="295">supports insurance-fund donations</text>

  <rect class="panel blue" x="350" y="390" width="280" height="140"/>
  <text class="subtitle" x="385" y="435">Lending Position NFT</text>
  <text class="body" x="385" y="470">represents claim on</text>
  <text class="body" x="385" y="498">deposited asset + accrued yield</text>

  <rect class="panel" x="720" y="390" width="390" height="140"/>
  <text class="subtitle" x="755" y="435">Yield Drivers</text>
  <text class="body" x="755" y="470">utilization-based borrow rate</text>
  <text class="body" x="755" y="498">vault-native cumulative accounting</text>

  <path class="line" d="M280 230 H330"/>
  <path class="line" d="M630 230 H700"/>
  <path class="line" d="M915 340 V370"/>
  <path class="line" d="M720 460 H650"/>
  <path class="line" d="M490 290 V370"/>
</svg>
